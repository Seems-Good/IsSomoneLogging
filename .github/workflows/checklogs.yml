name: Check Logs

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

concurrency:
  group: wcl-checker-6h
  cancel-in-progress: false

jobs:
  check-logs:
    runs-on: self-hosted
    #runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Restore last-seen cache
        uses: actions/cache@v4
        with:
          path: last_seen.json
          key: wcl-last-seen-${{ github.run_id }}
          restore-keys: |
            wcl-last-seen-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Run log checker
        env:
          WCL_CLIENT_ID:       ${{ secrets.WCL_CLIENT_ID }}
          WCL_CLIENT_SECRET:   ${{ secrets.WCL_CLIENT_SECRET }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          GUILD_NAME:          ${{ secrets.GUILD_NAME }}
          GUILD_REALM:         ${{ secrets.GUILD_REALM }}
          GUILD_REGION:        ${{ secrets.GUILD_REGION }}
        run: python checklogs.py

      - name: Save last-seen cache
        uses: actions/cache@v4
        with:
          path: last_seen.json
          key: wcl-last-seen-${{ github.run_id }}

      - name: Pull latest before badge update
        run: git pull --rebase origin main

      - name: Update last-run badge only
        run: |
          python -c "
          import json
          from datetime import datetime, timezone, timedelta
          now = datetime.now(timezone.utc)
          et_now = now + timedelta(hours=-4)
          last_run_str = et_now.strftime('%m/%d %I:%M %p ET')
          with open('last_run_badge.json', 'w') as f:
              json.dump({'schemaVersion': 1, 'label': 'last run', 'message': last_run_str, 'color': '5865F2'}, f)
          print('Last run: ' + last_run_str)
          "

      - name: Commit badge data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add last_run_badge.json
          git diff --cached --quiet || git commit -m "chore: update badge timestamps [skip ci]"
          git push
